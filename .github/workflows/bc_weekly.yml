name: Bandcamp Weekly

on:
  schedule:
    # 03:00 Kyiv (зимнее время) ≈ 01:00 UTC, суббота
    - cron: "0 1 * * 6"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install playwright pyyaml beautifulsoup4 lxml
          playwright install --with-deps

      - name: Run
        run: |
          python bc_weekly.py

      - name: Commit output
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add output/*.html output/*.json || true
          git commit -m "Weekly discovery update" || echo "No changes to commit"
          git push
